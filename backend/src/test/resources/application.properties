config_ordinal=300

# --- Base de donnÈes (H2 en mode PostgreSQL) ---
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:serenia;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;INIT=CREATE SCHEMA IF NOT EXISTS PUBLIC\\;SET REFERENTIAL_INTEGRITY FALSE
quarkus.datasource.username=sa
quarkus.datasource.password=sa
quarkus.http.root-path=/api

# --- Authentication ---
serenia.auth.max-users=2

# --- JWT ---
smallrye.jwt.sign.key.location=classpath:keys/privateKey.pem
mp.jwt.verify.publickey.location=classpath:keys/publicKey.pem

# --- OpenAI ---
openai.api.key=sk-testtesttesttesttest

# --- Email ---
quarkus.mailer.mock=true

# --- Stripe ---
stripe.api.key=sk_test_mock_stripe_key
stripe.webhook.secret=whsec_test_mock_secret

