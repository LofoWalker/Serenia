# ==============================================================================
# CONFIGURATION DES TESTS (%test)
# ==============================================================================

config_ordinal=350

# --- Base de donnťes (H2 en mode PostgreSQL) ---
%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:serenia;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;INIT=CREATE SCHEMA IF NOT EXISTS PUBLIC\\;SET REFERENTIAL_INTEGRITY FALSE
%test.quarkus.datasource.username=sa
%test.quarkus.datasource.password=sa
%test.quarkus.datasource.jdbc.driver=org.h2.Driver
%test.quarkus.datasource.jdbc.max-size=16

# --- HTTP ---
%test.quarkus.http.root-path=/api

# --- JWT Security ---
%test.mp.jwt.verify.publickey.location=classpath:keys/publicKey.pem
%test.mp.jwt.verify.issuer=serenia
%test.mp.jwt.token.header=Authorization
%test.smallrye.jwt.sign.key.location=classpath:keys/privateKey.pem

# --- Authentification Serenia ---
%test.serenia.auth.jwt-issuer=serenia
%test.serenia.auth.expiration-time=3600
%test.serenia.auth.max-users=2

# --- OpenAI ---
%test.openai.api.key=sk-testtesttesttesttest
%test.openai.model=gpt-4o-mini

# --- Mailer ---
%test.quarkus.mailer.mock=true

# --- Stripe ---
%test.stripe.api.key=sk_test_mock_stripe_key
%test.stripe.webhook.secret=whsec_test_mock_secret
%test.stripe.success.url=http://localhost:4200/profile?payment=success
%test.stripe.cancel.url=http://localhost:4200/profile?payment=cancel

# --- Quotas de tokens ---
%test.serenia.tokens.input-limit-default=8000
%test.serenia.tokens.output-limit-default=2000
%test.serenia.tokens.total-limit-default=10000

# --- Sťcuritť ---
%test.serenia.security.key=test-security-key-for-testing

# --- System Prompt ---
%test.serenia.system-prompt-path=classpath:prompt.md
