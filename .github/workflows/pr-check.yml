name: PR Validation

on:
  pull_request:
    branches: [ "main" ]

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Opt into Node.js 24 to avoid Node.js 20 deprecation warnings on GitHub-hosted actions
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Check system dependencies
        run: |
          echo "=== Java ==="
          java -version || echo "Java not found"
          echo "=== Maven ==="
          mvn -version || echo "Maven not found"
          echo "=== Node ==="
          node --version || echo "Node not found"
          echo "=== npm ==="
          npm --version || echo "npm not found"

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # Build & test the backend. The package phase produces target/quarkus-app/ (fast-jar, default in Quarkus 3.x).
      # Those pre-built artifacts are reused by the Docker CI build to avoid hitting Maven Central from inside Docker.
      - name: Backend - Build & Test
        run: |
          cd backend
          mvn -B clean verify -Dquarkus.package.type=fast-jar

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend - Install & Test
        run: |
          cd frontend
          npm ci
          npm run test

      - name: Frontend - Lint
        run: |
          cd frontend
          npm run lint

      # Prepare a minimal Docker build context from the pre-built Quarkus fast-jar artifacts.
      # This avoids re-downloading all Maven dependencies inside the Docker daemon (which can
      # fail with 403 / rate-limiting from Maven Central on ephemeral CI containers).
      - name: Backend - Prepare Docker CI context
        run: |
          mkdir -p backend/ci-docker-context
          cp -r backend/target/quarkus-app backend/ci-docker-context/quarkus-app
          cp backend/docker-entrypoint.sh   backend/ci-docker-context/docker-entrypoint.sh
          cp backend/Dockerfile.ci          backend/ci-docker-context/Dockerfile

      - name: Backend - Docker Build Check
        uses: docker/build-push-action@v5
        with:
          context: ./backend/ci-docker-context
          push: false
          cache-from: type=gha,scope=backend-docker
          cache-to: type=gha,mode=max,scope=backend-docker

      - name: Frontend - Docker Build Check
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          cache-from: type=gha,scope=frontend-docker
          cache-to: type=gha,mode=max,scope=frontend-docker
